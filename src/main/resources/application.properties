spring.application.name=virtual-wallet

spring.datasource.url=jdbc:mysql://localhost:3306/virtual_wallet?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.username= Todo: Place your DB username here
#spring.datasource.password= Todo: Place your DB password here

spring.web.resources.add-mappings=false

#security.jwt.secret= ToDo: Place your Secret here
security.jwt.expiration=3600000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.open-in-view=false ToDo: Consider how to limit sessions through this property

exchange.api.base-url=https://v6.exchangerate-api.com/v6
#exchange.api.key= Todo: Place our exchange api key here (https://www.exchangerate-api.com)